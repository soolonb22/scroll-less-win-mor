now your phone is stealing them. Today we take them back.",mission:"No phone for the first 20 minutes after waking up. Make your coffee or tea. Sit somewhere with natural light. Just exist. Stare out the window like a Victorian ghost if you must.",scrollSwap:"Replace the morning scroll with 5 minutes of just breathing and looking at one thing — a tree, the sky, your pet. This is not meditation. It's just existing without content.",winTip:"Your brain generates its most creative thinking in that drowsy pre-phone window. Every time you reach for your phone first, you're trading original thought for someone else's content.",offlineWin:"During that quiet window, one useful thought will often arrive uninvited. Write it down — could be a business idea, a to-do, or a memory."},{day:3,title:"The Scroll Audit",emoji:"📊",duration:"15 min",color:"lavender",vibe:"Today isn't about stopping anything. It's about getting honest.",mission:"Open your screen time stats right now. iPhone: Settings → Screen Time. Android: Settings → Digital Wellbeing. Write down your total daily average, top 3 apps, daily pickups, and longest single session. Sit with those numbers for a full minute. Don't judge them. Just look.",scrollSwap:"Every time you pick up your phone today, say out loud or in your head: 'I'm choosing to pick this up.' One moment of conscious decision before each session.",winTip:"Self-monitoring through screen time tools leads users to feel more goal-oriented and intentional. The act of tracking is doing real psychological work.",offlineWin:"Screenshot your stats and set them as your lock screen wallpaper for today. Invisible data doesn't change behaviour. Visible data does."},{day:4,title:"The Notification Funeral",emoji:"🔕",duration:"15 min",color:"blush",vibe:"Your phone has been throwing a party in your pocket all day. Today you gently decline every invite.",mission:"Go through your notification settings and turn off all non-essential notifications. Keep calls and messages from people you actually like. Mute everything else — every app, every badge, every banner.",scrollSwap:"When you feel the phantom buzz (the fake vibration your brain invents), take 3 slow breaths before reaching for your phone.",winTip:"Research shows notifications fragment attention and increase cortisol. Every notification you disabled today is a micro-distraction you'll never have to recover from.",offlineWin:"Without constant interruptions, you may actually finish a full thought today. Write it down when it happens."},{day:5,title:"Do One Thing Slowly",emoji:"🐢",duration:"30 min",color:"cream",vibe:"In a world of infinite scroll and 15-second clips, doing one thing slowly is an act of rebellion.",mission:"Choose one task you'd normally rush through and do it at half speed. Make your coffee slowly. Eat a meal without your phone. Fold laundry and actually feel the fabric. Walk somewhere without headphones. The task doesn't matter — the pace does.",scrollSwap:"When the urge to reach for your phone hits, ask: 'What am I avoiding right now?' Just notice. You don't have to fix it.",winTip:"Slow tasks activate your parasympathetic nervous system — your rest-and-digest mode. Your nervous system is quietly thanking you right now.",offlineWin:"You might notice your surroundings more than usual today. That's your attention span coming back online."},{day:6,title:"The Outdoor Prescription",emoji:"🌿",duration:"20 min",color:"mint",vibe:"Your brain is a biological system that evolved outdoors. Today we give it what it's been craving.",mission:"Spend at least 20 minutes outside with no phone in your hand. Walk, sit, stand — whatever. Phone in pocket or left inside. No earbuds either, if you can manage. Just you and the actual world.",scrollSwap:"When you'd normally scroll, step outside for 5 minutes instead. Even just standing outside counts. Even if it's hot.",winTip:"Nature exposure for as little as 20 minutes measurably reduces cortisol levels. The outdoor world is the original dopamine reset.",offlineWin:"Notice one thing you'd have missed if you were on your phone: a cloud shape, a bird, the way light hits something."},{day:7,title:"Re-Read Revival",emoji:"📚",duration:"25 min",color:"peach",vibe:"Somewhere on your shelf is a book that changed something for you. Today you revisit it.",mission:"Find a book you've loved before and read for 25 minutes without stopping. No new books — the goal is depth, not novelty. If you don't have one handy, any physical reading material counts.",scrollSwap:"Every time you'd normally open a social app, open your book instead. Even one page counts.",winTip:"Re-reading familiar material creates a sense of comfort and mastery that new content rarely provides. Your brain gets a genuine break from novelty-seeking.",offlineWin:"You might find a passage that hits differently now than when you first read it. That's you having changed. Note it."},{day:8,title:"Contact a Human On Purpose",emoji:"🤙",duration:"10 min",color:"lavender",vibe:"You have real relationships with real people who miss hearing from you. Today you reach one.",mission:"Send a genuine, personal message to someone you haven't contacted in too long. Not a meme, not a reaction — an actual message. 'Hey, I've been thinking about you' counts. A voice note is even better. A phone call is vintage excellence.",scrollSwap:"Every time you feel the impulse to check social media, redirect that energy into one real sentence to one real person.",winTip:"Real social connection releases oxytocin in a way parasocial digital scrolling never does. One real message is worth 100 passive scroll sessions.",offlineWin:"The response you get back might surprise you. Real people say real things. Algorithms never do."},{day:9,title:"Make Something Ugly",emoji:"🎨",duration:"20 min",color:"blush",vibe:"Making things is the antidote to consuming things. Today you create, with zero pressure to be good.",mission:"Make something with your hands for 20 minutes with zero intention of sharing it. Draw badly. Write a terrible poem. Cook something weird. Build with whatever's nearby. Quality is irrelevant. The doing is everything.",scrollSwap:"Put your phone in a drawer for these 20 minutes. Physical inaccessibility beats willpower every time.",winTip:"Creative activities activate different reward pathways than passive consumption — and they don't require an internet connection.",offlineWin:"Keep whatever you made, however bad it is. You made a thing. That's more than the algorithm ever helped you do."},{day:10,title:"The Analog Evening",emoji:"🕯️",duration:"All evening",color:"lavender",vibe:"Screens off at 8pm. Your evening belongs to you now.",mission:"No screens after 8pm (or 2 hours before bed). Read, talk, stretch, journal, sit in the bath, stare at the ceiling. If this feels impossible, start with one hour.",scrollSwap:"When you instinctively reach for your phone tonight, pick up a pen and write three things that happened today. No filter.",winTip:"Blue light from screens suppresses melatonin production. An analog evening physically improves your sleep quality.",offlineWin:"You'll likely fall asleep faster tonight. Notice how different your morning feels tomorrow."},{day:11,title:"Map the Machine",emoji:"🗺️",duration:"20 min",color:"mint",vibe:"You can't change what you don't understand. Today you reverse-engineer your own scroll triggers.",mission:"For one full hour, every time you reach for your phone, write down: the time, what you were doing before, and what emotion (boredom, anxiety, loneliness) you noticed. By the end of the hour, you'll have a map of your personal trigger patterns.",scrollSwap:"Use the trigger map you built to predict your next urge. When it hits, name the emotion out loud before picking up the phone.",winTip:"Awareness of triggers is step one of every effective behaviour change model. You're not fighting habits — you're understanding them.",offlineWin:"Patterns you spot today will inform choices for the rest of the challenge. This one has compound interest."},{day:12,title:"The Deep Work Block",emoji:"🧱",duration:"45 min",color:"peach",vibe:"Your best thinking happens in uninterrupted stretches. Today you protect one.",mission:"Pick one meaningful task and work on it for 45 uninterrupted minutes. Phone in another room. No tabs open except what you need. No checking anything. Use a timer. This is your deep work block — protect it like a meeting you can't miss.",scrollSwap:"When distraction urges hit during your block, write the distraction on paper and return to it after. Brain dump, don't browser tab.",winTip:"Research shows most people get only 2–4 hours of genuine deep work per day. Protecting even one block puts you ahead.",offlineWin:"Whatever you produce in that 45 minutes is probably more than you'd have done in an afternoon of distracted half-working."},{day:13,title:"The Digital Menu",emoji:"📋",duration:"15 min",color:"cream",vibe:"You wouldn't eat at a restaurant that piled random food on your plate. Why let your phone do the same?",mission:"Decide in advance what you're allowed to use your phone for today — and write the list down. Example: Maps when driving, messages with family, one music app. Everything not on the list is off-limits today.",scrollSwap:"When you reach for an app not on your list, pause and ask: 'Is this hunger, or just habit?' Then make a conscious choice.",winTip:"Intentional use versus reactive use is the difference between your phone serving you and you serving your phone.",offlineWin:"By day's end, you'll know exactly which apps are habits versus which are genuinely useful to you."},{day:14,title:"Two-Week Checkpoint",emoji:"🏁",duration:"20 min",color:"blush",vibe:"Two weeks in. You're not the same person who started this. Let's find out who you are now.",mission:"Write a half-page honestly. What's changed? What's harder than expected? What surprising thing have you noticed? Don't perform wellness — just be honest. What one habit from the last 14 days has actually stuck?",scrollSwap:"Today, for every time you would normally scroll, read one thing from your two-week reflection instead.",winTip:"Reflection consolidates learning. Writing what you've noticed literally helps your brain form long-term memories of these new patterns.",offlineWin:"Keep this note. You'll read it on Day 30 and be surprised by yourself."},{day:15,title:"The Comparison Detox",emoji:"🪞",duration:"All day",color:"lavender",vibe:"Every 'less than' thought you've had this week probably came from a feed. Today you catch it in the act.",mission:"Every time you feel a flash of comparison — 'their life looks better / they have more / I should look like that' — put a tally mark in a notebook, on your hand, or in your phone's notes. Don't judge it, just count it. At the end of the day: look at your number, write down what triggered the most tallies, and write 3 things that are genuinely, specifically good in your own life right now.",scrollSwap:"Comparison trigger → tally mark + immediately close app. You're training yourself to notice the mechanism. Noticing it is the intervention.",winTip:"You are not comparing your real life to someone else's real life. You are comparing your inner experience to their outer performance. A meta-analysis covering 15 years of research found upward social comparison consistently harms body image, wellbeing, and self-esteem.",offlineWin:"Tonight, without your phone, write the names of 3 people whose company genuinely makes you feel good about yourself. Plan to contact one of them this week.",science:"Research shows comparison is the active mechanism linking scrolling to depression — not just screen time itself. More depressive symptoms lead to more social comparison, and more comparison leads to more depressive symptoms.",activities:["The Feed Audit — mark every account that has ever made you feel worse about yourself. Awareness of the sources is the first step.","The Real Gratitude Practice — each item must be specific, recent, and yours. Not 'my health' but 'the fact that I slept well last night.'","The Comparison Reframe — for each comparison thought, ask: 'Is this about my life, or a curated image of someone else's?'","The Enough Inventory — write a list titled 'Things that are enough.' Your home, your people, your skills, your history."]},{day:16,title:"The Single Tab Sprint",emoji:"🖥️",duration:"45 min",color:"mint",vibe:"Multitasking is a myth. Today you run a one-tab experiment.",mission:"For one work session today: only one browser tab open at a time. When you need another, close the current one first. No exceptions. Notice how often you instinctively want to escape the current tab.",scrollSwap:"Every time you want to open a new tab as distraction, write down what you were actually avoiding on paper.",winTip:"Tab-switching behaviour mirrors the same escape pattern as phone-checking. Same trigger, same reward loop, different device.",offlineWin:"The single tab sprint will produce something. Note what you completed versus what you were avoiding."},{day:17,title:"The Afternoon Off",emoji:"🛋️",duration:"2 hours",color:"peach",vibe:"Somewhere along the way, resting without content became uncomfortable. Today you fix that.",mission:"Take a two-hour window this afternoon with no scheduled content. No podcasts, no background TV, no music with lyrics, no scrolling. You can nap, walk slowly, cook, garden, sit, daydream.",scrollSwap:"When restlessness peaks (it will, around minute 20), breathe through it. The other side of boredom is creativity.",winTip:"Your brain's Default Mode Network — where memory consolidation, creativity, and self-reflection happen — only activates when you're not consuming content.",offlineWin:"You might have a genuinely original idea during this window. Write it down when it shows up."},{day:18,title:"Use Your Voice",emoji:"🎤",duration:"All day",color:"blush",vibe:"You've been communicating in text and taps. Today you upgrade to human sound.",mission:"Replace all text messages you would normally send today with voice notes or actual phone calls. Every message. If someone replies by text, respond by voice. Notice how much more human the conversation feels.",scrollSwap:"Every time you'd normally text-dump your feelings into a DM, record a 30-second voice note instead.",winTip:"Voice communication carries tone, nuance, and warmth that text strips out. You'll feel more connected after one voice note than after ten texts.",offlineWin:"The people you voice-note today will likely respond more warmly than usual. Human voice activates human response."},{day:19,title:"The Grateful Interruption",emoji:"🔔",duration:"All day",color:"cream",vibe:"Your phone interrupts you 80+ times a day. Today you interrupt it right back.",mission:"Set three alarms today — morning, afternoon, evening — labelled 'GRATEFUL.' When each fires, put your phone down immediately and speak three specific things you're grateful for. Not generic. Specific.",scrollSwap:"When you reach for your phone, set a grateful interruption instead. Name one specific thing before you open any app.",winTip:"Gratitude practices rewire the brain toward positive pattern recognition. Specificity matters — 'my coffee' is more effective neurologically than 'my life.'",offlineWin:"By the end of today you'll have 9 specific good things. That's more positive intentional thought than most people have in a week."},{day:20,title:"Start The Thing",emoji:"🚀",duration:"30 min",color:"lavender",vibe:"There's a thing you've been putting off. Not because you can't — but because you've been using your phone as a way to not start.",mission:"Think of the one thing you've been putting off for more than a week. Today you start it. Not finish — just start. You only need 30 minutes and a first step. Phone in a drawer. Timer on. Go.",scrollSwap:"Every time the urge to procrastinate-scroll hits, ask: 'Is this more important than starting The Thing?' It isn't.",winTip:"The Zeigarnik Effect: unfinished tasks occupy more mental RAM than completed ones. Starting The Thing will literally free up headspace.",offlineWin:"Whatever you start today has momentum. Even a partial start beats a complete non-start every time."},{day:21,title:"The 3-Week Report",emoji:"📈",duration:"20 min",color:"mint",vibe:"Three weeks in. Your brain has genuinely changed. Time to measure it.",mission:"Pull up your screen time stats again (like Day 3). Compare them to your Day 3 numbers. Write down: what's lower? What's the same? What surprised you? Write one specific behaviour you've changed that you wouldn't have believed 21 days ago.",scrollSwap:"Celebrate the gap between your Day 3 stats and today. That gap is you.",winTip:"21 days is often cited as habit formation time. You've completed a full cycle. Your baseline has genuinely shifted.",offlineWin:"Share your 3-week insight with someone in your life. Saying it out loud makes it more real."},{day:22,title:"The App Divorce",emoji:"💔",duration:"15 min",color:"peach",vibe:"Some apps in your life are not serving you. Today you have a quiet, dignified breakup.",mission:"Go through your apps and delete three you haven't opened intentionally in the last month, or three that make you feel worse after using them. If deletion feels too final, move them to a folder called 'Graveyard.'",scrollSwap:"The empty space where those apps were is now available real estate. Leave it blank intentionally. That blank is freedom.",winTip:"Friction is your friend. Adding steps between you and a habit reduces engagement. Distance equals choice.",offlineWin:"Your phone's home screen is a reflection of your priorities. What it looks like now is better than Day 1."},{day:23,title:"Slow Sunday",emoji:"🌱",duration:"All day",color:"cream",vibe:"Sundays used to belong to people. Today you reclaim yours.",mission:"Design your ideal low-screen Sunday on paper: when you wake up, what you'll make for breakfast, one outdoor thing, one creative thing, one rest thing, one conversation. Then live it. Phone exists today for navigation and emergencies only.",scrollSwap:"When the Sunday scroll beckons (it will), return to your paper plan. You already have something better scheduled.",winTip:"A planned leisure day is significantly more restorative than an unplanned one. The structure creates permission to actually rest.",offlineWin:"By Sunday evening you may feel genuinely restored — not just entertained. Notice the difference."},{day:24,title:"Teach Someone Something",emoji:"🎓",duration:"20 min",color:"blush",vibe:"You've learned real things over the last 23 days. Today you share one.",mission:"Teach someone one thing you've learned from this challenge or anything recently. Could be a fact about dopamine, a screen hack, a habit that worked for you. Teach it in person, over the phone, in a voice note, or in a letter.",scrollSwap:"Instead of consuming content today, create one piece of it — a voice note, a letter, a message — that gives someone something useful.",winTip:"The protégé effect: teaching something to another person improves your own understanding and memory of it by up to 28%.",offlineWin:"The person you teach something to today might carry it for years. Knowledge shared has longer legs than knowledge hoarded."},{day:25,title:"Phone Down, Eyes Up",emoji:"👁️",duration:"All day",color:"lavender",vibe:"There's a whole world happening at eye level. Today you actually look at it.",mission:"Every time you're in a public space today — a queue, a waiting room, a bus, a café — put your phone away and look around. Make eye contact. Notice details. Listen to ambient sounds. You're allowed to be bored.",scrollSwap:"Replace one scroll session with five minutes of genuine observation of wherever you are. Describe what you see in your notebook.",winTip:"The world is providing constant, free, novel stimulation. You've just been looking at a rectangle instead of it.",offlineWin:"You'll likely notice something today you'd have completely missed. Write it down. That's the world giving you a gift."},{day:26,title:"The Pomodoro Sprint",emoji:"🍅",duration:"2 hours",color:"mint",vibe:"25 minutes of focus + 5 minutes of real rest. Repeat. The most evidence-based productivity method that exists.",mission:"Do 4 Pomodoro rounds: 25 minutes of focused work, then a 5-minute break with NO phone. In the breaks: stretch, breathe, make tea, look out the window. On the fourth break, take 15 minutes.",scrollSwap:"The 5-minute break is sacred. If you spend it on your phone, the reset doesn't happen. The break IS the break.",winTip:"The Pomodoro Technique works with — not against — your brain's natural attention cycles. 25 minutes is not arbitrary.",offlineWin:"What you get done in 4 focused pomodoros will likely exceed what you'd accomplish in a full distracted afternoon."},{day:27,title:"Design Your Stack",emoji:"🏗️",duration:"30 min",color:"peach",vibe:"You've spent 27 days testing things. Now you design your personal system.",mission:"Write down the habits from this challenge that actually worked for you. Pick 3–5 to keep. Now design them into a morning stack and an evening stack — sequences where one habit immediately triggers the next.",scrollSwap:"Your stack replaces your default scroll routine. What starts your morning now? What ends your evening?",winTip:"Habit stacking — attaching a new habit to an existing one — has the highest sustained adoption rate of any behaviour change technique.",offlineWin:"Your stack document is your personal operating system. Keep it somewhere visible for the next 30 days."},{day:28,title:"Letter to Future You",emoji:"✉️",duration:"20 min",color:"blush",vibe:"Future You is reading what you write today. They're hoping you made choices that make their life easier, more present, and more real.",mission:"Write a letter to yourself — 3, 6, or 12 months from now. What do you want them to remember from this challenge? What habits do you hope they kept? Write it honestly.",scrollSwap:"Instead of scrolling tonight, read your letter out loud to yourself. Then seal it somewhere you'll find it later.",winTip:"Future self continuity — the sense of connection to your future self — is one of the strongest predictors of long-term behaviour change.",offlineWin:"You've just given future you a gift. That's a genuinely kind thing to do for yourself."},{day:29,title:"The Social Media Fast",emoji:"🚫",duration:"All day",color:"lavender",vibe:"One full day. No social media. You know you can do this. You've been building up to it.",mission:"No social media today. All of it. Instagram, TikTok, Facebook, Twitter/X, Reddit, YouTube Shorts, LinkedIn — all of it. Log out if it helps. Today you find out who you are when the feed is quiet.",scrollSwap:"Every time the social media urge hits, do 10 squats. By evening you'll be either very fit or very calm. Possibly both.",winTip:"Studies show that a single day of social media abstinence measurably improves mood and reduces anxiety in habitual users.",offlineWin:"Notice what you think about when the feed is gone. Those are your actual thoughts. That's your actual mind."},{day:30,title:"Your Digital Balance Charter",emoji:"📜",duration:"30 min",color:"cream",vibe:"Thirty days. You made it. Now you write your own rules for what comes next.",mission:"Write your personal Digital Balance Charter. Include: Your Screen Time Target, Your Morning Rule, Your Evening Rule, Your One Non-Negotiable habit, and Your Reset Clause (if things slip, how do you restart without shame?).",scrollSwap:"Today and every day after: you get to choose what your phone relationship looks like. The algorithm doesn't decide. You do.",winTip:"You've just spent 30 days intentionally reshaping one of the most pervasive behavioural patterns in modern life. That is actually remarkable.",offlineWin:"Share one thing you learned from this challenge with someone you love. The ripple effect of what you've done here is bigger than you know."}],un={mint:{bg:"#e8f8f0",
